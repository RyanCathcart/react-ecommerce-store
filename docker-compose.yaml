services:
  reactecommercestore.api:
    image: ${DOCKER_REGISTRY-}reactecommercestoreapi
    build:
      context: .
      dockerfile: ReactECommerceStore.Api/Dockerfile

  postgres:
    image: postgres:alpine
    restart: "unless-stopped"
    container_name: reactecommercestore_postgres
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 10s
        timeout: 5s
        retries: 5
    environment:
      POSTGRES_DB: react_estore_db_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - ecommerce_db_pg_data:/var/lib/postgresql/data
    ports: 
     - "5432:5432"
    
volumes:
 ecommerce_db_pg_data:
